<svg xmlns="http://www.w3.org/2000/svg" width="920" height="240" viewBox="0 0 920 240" role="img" aria-labelledby="title desc">
  <title id="title">AgentContextKit Flow</title>
  <desc id="desc">Repository input flows through ackit scan into findings, context files, reports, SARIF, and CI examples.</desc>
  <rect width="920" height="240" fill="#ffffff"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .label { fill: #0f172a; font: 600 17px Arial, sans-serif; text-anchor: middle; }
      .small { fill: #334155; font: 14px Arial, sans-serif; text-anchor: middle; }
      .line { stroke: #2563eb; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="box" x="30" y="78" width="150" height="84"/>
  <text class="label" x="105" y="112">Repository</text>
  <text class="small" x="105" y="136">local source</text>
  <path class="line" d="M 185 120 H 285"/>
  <rect class="box" x="290" y="78" width="150" height="84"/>
  <text class="label" x="365" y="112">ackit scan</text>
  <text class="small" x="365" y="136">offline review</text>
  <path class="line" d="M 445 120 H 545"/>
  <rect class="box" x="550" y="24" width="150" height="56"/>
  <text class="small" x="625" y="57">Risk findings</text>
  <rect class="box" x="550" y="92" width="150" height="56"/>
  <text class="small" x="625" y="125">Context files</text>
  <rect class="box" x="550" y="160" width="150" height="56"/>
  <text class="small" x="625" y="193">Reports</text>
  <path class="line" d="M 705 52 H 785"/>
  <path class="line" d="M 705 120 H 785"/>
  <path class="line" d="M 705 188 H 785"/>
  <rect class="box" x="790" y="58" width="100" height="56"/>
  <text class="small" x="840" y="91">SARIF</text>
  <rect class="box" x="790" y="130" width="100" height="56"/>
  <text class="small" x="840" y="163">CI examples</text>
</svg>
