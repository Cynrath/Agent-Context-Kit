# documentation example only
# Copy into .github/workflows only after review.
# Packs the current branch and installs AgentContextKit from the temporary local package source.
# Use this pattern to test source features that are not yet in the published NuGet package, including ackit sarif.

name: ackit-source-package-smoke-example

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore, build, and test
        shell: pwsh
        run: |
          dotnet restore AgentContextKit.sln
          dotnet build AgentContextKit.sln -c Release --no-restore
          dotnet test AgentContextKit.sln -c Release --no-build

      - name: Pack current source
        shell: pwsh
        run: |
          $pkg = Join-Path $env:RUNNER_TEMP "ackit-packages"
          New-Item -ItemType Directory -Force -Path $pkg | Out-Null
          dotnet pack src/AgentContextKit.Cli/AgentContextKit.Cli.csproj -c Release --no-build -o $pkg
          "ACKIT_PACKAGE_SOURCE=$pkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install current source package
        shell: pwsh
        run: |
          $tools = Join-Path $env:RUNNER_TEMP "ackit-tools"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          dotnet tool install AgentContextKit --tool-path $tools --add-source "$env:ACKIT_PACKAGE_SOURCE" --version 0.2.0-alpha.1 --ignore-failed-sources
          "ACKIT_TOOL_PATH=$tools" | Out-File -FilePath $env:GITHUB_ENV -Append
          $tools | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Run source package smoke
        shell: pwsh
        run: |
          $demoRoot = Join-Path $env:RUNNER_TEMP "ackit-source-smoke"
          New-Item -ItemType Directory -Force -Path $demoRoot | Out-Null
          Set-Location $demoRoot
          dotnet new console -n DemoApp
          Set-Location DemoApp
          git init
          ackit version
          ackit --help
          ackit init --lang en
          ackit scan --ci
          ackit generate --target all --lang en
          ackit task "Source package smoke test" --lang en
          ackit report --output .ackit/reports/smoke.html
          ackit webui --output .ackit/webui/index.html
          ackit sarif --output .ackit/reports/smoke.sarif
          Get-Content .ackit/reports/smoke.sarif | ConvertFrom-Json | Out-Null

      - name: Verify final scan
        shell: pwsh
        run: |
          $demo = Join-Path $env:RUNNER_TEMP "ackit-source-smoke/DemoApp"
          Set-Location $demo
          ackit scan --ci
