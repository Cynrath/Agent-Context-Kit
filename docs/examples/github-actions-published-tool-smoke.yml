# documentation example only
# Copy into .github/workflows only after review.
# Uses the published NuGet package AgentContextKit 0.2.0-alpha.2.
# This package includes ackit sarif.

name: ackit-published-tool-smoke-example

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install AgentContextKit
        shell: pwsh
        run: dotnet tool install --global AgentContextKit --version 0.2.0-alpha.2

      - name: Add .NET tools to PATH
        shell: pwsh
        run: |
          if ($IsWindows) {
            "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          } else {
            "$HOME/.dotnet/tools" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Create demo app
        shell: pwsh
        run: |
          $demoRoot = Join-Path $env:RUNNER_TEMP "ackit-published-smoke"
          New-Item -ItemType Directory -Force -Path $demoRoot | Out-Null
          Set-Location $demoRoot
          dotnet new console -n DemoApp
          Set-Location DemoApp
          git init
          ackit version
          ackit --help
          ackit init --lang en
          ackit scan --ci
          ackit generate --target all --lang en
          ackit task "Published tool smoke test" --lang en
          ackit report --output .ackit/reports/smoke.html
          ackit webui --output .ackit/webui/index.html
          ackit sarif --output .ackit/reports/smoke.sarif
          Get-Content .ackit/reports/smoke.sarif | ConvertFrom-Json | Out-Null

      - name: Verify generated files
        shell: pwsh
        run: |
          $demo = Join-Path $env:RUNNER_TEMP "ackit-published-smoke/DemoApp"
          $required = @(
            ".ackit/config.yml",
            "AGENTS.md",
            ".ackit/reports/smoke.html",
            ".ackit/reports/smoke.sarif",
            ".ackit/webui/index.html"
          )
          foreach ($path in $required) {
            $fullPath = Join-Path $demo $path
            if (-not (Test-Path $fullPath)) {
              throw "Missing expected file: $path"
            }
          }
