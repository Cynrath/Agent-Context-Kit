# documentation example only
# Copy into .github/workflows only after review.
# Uses the published NuGet package AgentContextKit 0.2.0-alpha.1.

name: ackit-scan-ci-example

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install AgentContextKit
        run: dotnet tool install --global AgentContextKit --version 0.2.0-alpha.1

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Run repository scan
        run: ackit scan --ci

      - name: Run repository health checks
        run: ackit doctor
