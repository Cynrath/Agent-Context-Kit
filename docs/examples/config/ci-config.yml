# CI-oriented config.
# This example keeps generated local output ignored while allowing a few
# known-safe documentation references. All suppressions are non-Critical only.
schemaVersion: 1
defaultLanguage: en
brandKeywords: []
piiKeywords: []
ignorePaths:
  - .ackit/cache/
  - .ackit/reports/
  - .ackit/webui/
  - .ackit/prompt-packs/
  - .ackit/context-exports/
riskExtensions:
  - .bak
  - .tmp
  - .log
  - .sql
safeDomains:
  - docs.example.invalid
  - '*.docs.example.invalid'
ignoredPaths:
  - docs/generated-examples/
  - fixtures/public-placeholders/
ignoredFindingIds:
  - ACKIT003
