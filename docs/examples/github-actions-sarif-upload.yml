# Example only. Do not copy into .github/workflows without maintainer review.
# This workflow shows how AgentContextKit SARIF output could be uploaded to GitHub Code Scanning.

name: ackit-sarif-upload-example

on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sarif:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install AgentContextKit
        run: dotnet tool install --global AgentContextKit --version 0.1.0-alpha.2

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate SARIF
        run: ackit sarif --output .ackit/reports/ackit.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .ackit/reports/ackit.sarif
