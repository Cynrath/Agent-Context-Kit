# documentation example only
# Copy into .github/workflows only after review.
# GitHub Code Scanning upload requires maintainer approval.
# The published AgentContextKit 0.2.0-alpha.1 package includes ackit sarif.
# Recommended first opt-in: manual trigger, published package, one upload job.

name: ackit-sarif-upload-example

on:
  workflow_dispatch:

jobs:
  upload-sarif:
    name: Generate and upload AgentContextKit SARIF
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install published AgentContextKit
        run: dotnet tool install --global AgentContextKit --version 0.2.0-alpha.1

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate SARIF
        run: ackit sarif --output .ackit/reports/ackit.sarif

      - name: Validate SARIF JSON
        shell: pwsh
        run: |
          if (-not (Test-Path ".ackit/reports/ackit.sarif")) {
            throw "Expected SARIF output was not created."
          }
          Get-Content ".ackit/reports/ackit.sarif" | ConvertFrom-Json | Out-Null

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .ackit/reports/ackit.sarif
